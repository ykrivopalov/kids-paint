<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Body -->
  <circle cx="50" cy="65" r="25" stroke="black" stroke-width="2" fill="none"/>
  <!-- Head -->
  <circle cx="50" cy="35" r="18" stroke="black" stroke-width="2" fill="none"/>
  <!-- Ears -->
  <polygon points="35,25 30,5 45,20" stroke="black" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <polygon points="65,25 70,5 55,20" stroke="black" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <!-- Tail -->
  <path d="M 70 75 Q 90 85 85 55" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="43" cy="32" r="2" fill="black"/>
  <circle cx="57" cy="32" r="2" fill="black"/>
  <!-- Nose/mouth -->
  <path d="M 48 38 Q 50 42 52 38" stroke="black" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="15" y1="36" x2="30" y2="38" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <line x1="15" y1="40" x2="30" y2="40" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <line x1="70" y1="38" x2="85" y2="36" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <line x1="70" y1="40" x2="85" y2="40" stroke="black" stroke-width="1" stroke-linecap="round"/>
</svg>
